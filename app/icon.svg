    <rect x="6" y="19" width="20" height="2" rx="1" fill="#7C3AED" opacity="0.3"/>
    
    <!-- Dollar sign -->
    <g transform="translate(26, 22)">
      <path d="M 6 2 L 6 16" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M 3 5 C 3 5 3 3 6 3 C 9 3 9 5 9 5 C 9 7 6 7 6 7 C 3 7 3 9 3 11 C 3 11 3 13 6 13 C 9 13 9 11 9 11" 
            stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>
</svg>
