  <!-- Wallet icon -->
  <g transform="translate(12, 14)">
    <!-- Wallet body -->
    <rect x="2" y="8" width="36" height="28" rx="4" fill="white" opacity="0.95"/>
    
    <!-- Wallet flap -->
    <path d="M 6 8 L 6 4 C 6 2.5 7 1 8.5 1 L 31.5 1 C 33 1 34 2.5 34 4 L 34 8" 
          fill="white" opacity="0.8"/>
    
